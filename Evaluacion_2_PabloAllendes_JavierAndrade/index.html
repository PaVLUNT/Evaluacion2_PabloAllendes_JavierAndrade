<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Contactos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="nav-container"></div>

    <main class="container mt-4">

        <h1 class="titulo-pagina">Agenda de Contactos</h1>
        <p class="text-muted mb-4">Gestiona tus contactos personales y de trabajo</p>

        <div class="row mb-4">
            <div class="col-6 col-md-3">
                <div class="card card-contador bg-white shadow-sm">
                    <p class="text-muted mb-1">Total contactos</p>
                    <h3 class="fw-bold text-primary mb-0" id="total-contactos">0</h3>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card card-contador bg-white shadow-sm">
                    <p class="text-muted mb-1">Favoritos</p>
                    <h3 class="fw-bold text-warning mb-0" id="total-favoritos">0</h3>
                </div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6 mb-2">
                <input type="text" id="input-buscar" class="form-control" placeholder="Buscar por nombre">
            </div>
            <div class="col-md-6 mb-2 d-flex gap-2">
                <button class="btn btn-primary" onclick="buscarContacto()">Buscar</button>
                <button class="btn btn-secondary" onclick="mostrarTodos()">Ver todos</button>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalContacto" onclick="prepararNuevo()">Agregar</button>
            </div>
        </div>
        
        <div class="row" id="lista-contactos"></div>

        <div id="sin-contactos" class="text-center py-5" style="display: none;">
            <p class="text-muted">No hay contactos para mostrar.</p>
        </div>

    </main>

    <div class="modal fade" id="modalContacto" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="titulo-modal">Agregar Contacto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Nombre *</label>
                        <input type="text" id="input-nombre" class="form-control" placeholder="Nombre completo">
                        <small id="error-nombre" class="text-danger" style="display:none;">El nombre es obligatorio</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo electronico *</label>
                        <input type="text" id="input-email" class="form-control" placeholder="correo@ejemplo.com">
                        <small id="error-email" class="text-danger" style="display:none;">Ingresa un correo valido</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Telefono *</label>
                        <input type="text" id="input-telefono" class="form-control" placeholder="912345678">
                        <small id="error-telefono" class="text-danger" style="display:none;">Solo se permiten numeros</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoria</label>
                        <select id="input-categoria" class="form-select">
                            <option value="Personal">Personal</option>
                            <option value="Trabajo">Trabajo</option>
                            <option value="Familia">Familia</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>

                    <input type="hidden" id="input-id">

                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" onclick="guardarContacto()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEliminar" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Eliminar contacto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>¿Seguro que quieres eliminar a <strong id="nombre-eliminar"></strong>?</p>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">No</button>
                    <button class="btn btn-danger" onclick="confirmarEliminar()">Si, eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
